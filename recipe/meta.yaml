{% set name = "thinc" %}
{% set version = "8.3.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 49983f9b7ddc4343a9532694a9118dd216d7a600520a21849a43b6c268ec6cad

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: True  # [py<39 or py>313]
  ignore_run_exports:
    - libcxx
    - numpy

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - pip
    - python
    - wheel
    - setuptools
    - cython >=3.0,<4.0
    - murmurhash >=1.0.2,<1.1.0
    - cymem >=2.0.2,<2.1.0
    - preshed >=3.0.2,<3.1.0
    - cython-blis >=1.3.0,<1.4.0
    - numpy >=2.0.0,<3.0.0
  run:
    - python
    # loosened bounds as per https://github.com/explosion/thinc/compare/release-v8.3.2...release-v8.3.6
    - numpy >=1.19.0,<3.0.0
    - cython-blis >=1.3.0,<1.4.0
    - murmurhash >=1.0.2,<1.1.0
    - cymem >=2.0.2,<2.1.0
    - preshed >=3.0.2,<3.1.0
    - wasabi >=0.8.1,<1.2.0
    - srsly >=2.4.0,<3.0.0
    - catalogue >=2.0.4,<2.1.0
    - confection >=0.0.1,<1.0.0
    - setuptools
    - pydantic >=2.0.0,<3.0.0
    - packaging >=20.0
    - dataclasses >=0.6,<1.0  # [py<37]
    - typing_extensions >=3.7.4.1,<5.0.0  # [py<38]
    - contextvars >=2.4,<3  # [py<37]
  run_constrained:
    # apple
    - thinc-apple-ops >=1.0.0,<2.0.0
    # datasets
    - ml_datasets >=0.2.0,<0.3.0
    # mxnet
    - mxnet >=1.5.1,<1.6.0
    # tensorflow
    - tensorflow >=2.0.0,<2.6.0
    # torch
    - pytorch >=1.6.0

test:
  imports:
    - thinc
    - thinc.api
    - thinc.backends
    - thinc.extra
    - thinc.layers
    - thinc.shims
  commands:
    - pip check
    - python -m pytest --tb=native --pyargs thinc
  requires:
    - hypothesis
    - pytest
    - mock
    - pip

about:
  home: https://thinc.ai
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A refreshing functional take on deep learning, compatible with your favorite libraries.
  description: |
    Thinc is a lightweight deep learning library that offers an elegant, type-checked, functional-programming API 
    for composing models, with support for layers defined in other frameworks 
    such as PyTorch, TensorFlow and MXNet. You can use Thinc as an interface layer, a standalone toolkit 
    or a flexible way to develop new models. Previous versions of Thinc have been running quietly in production in thousands of companies, 
    via both spaCy and Prodigy.
  dev_url: https://github.com/explosion/thinc
  doc_url: https://thinc.ai/docs

extra:
  recipe-maintainers:
    - rmax
    - honnibal
    - ines
    - adrianeboyd
  skip-lints:
    - cython_needs_compiler
    - python_build_tool_in_run
